{% set name = "mixpanel" %}
{% set version = "4.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mixpanel-{{ version }}.tar.gz
  sha256: ebfbad5732963d9844619e8d1e57b01f2b77f6e6b13cbe48d892479880665892

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - six >=1.9.0
    - requests >=2.4.2
    - urllib3

test:
  imports:
    - mixpanel
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mixpanel/mixpanel-python
  summary: Official Mixpanel library for Python
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - rabah-khalek
    - synapticarbors
